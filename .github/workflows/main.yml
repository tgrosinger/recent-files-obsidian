name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install modules
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm run build

      - name: Run ESLint
        run: pnpm run eslint
